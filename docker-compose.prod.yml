# ============================================================
# Production overlay — adds an Nginx reverse proxy with TLS termination.
# Usage:
#   ./infra/nginx/generate-self-signed-cert.sh   # or provide real certs
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# The proxy terminates HTTPS on 443 (HTTP 80 redirects), routing /api + /metrics
# to the backend and everything else to the frontend. Backend/frontend remain on
# the internal network; in a hardened deployment do not publish their host ports.
# ============================================================
services:
  reverse-proxy:
    image: nginx:alpine
    container_name: cp_proxy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - cloudnet

  backend:
    environment:
      - NODE_ENV=production
      # Public HTTPS origin the SPA is served from (set to your real domain).
      - CORS_ORIGIN=${CORS_ORIGIN:-https://localhost}
