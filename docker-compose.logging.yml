# Logging + alerting overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.logging.yml up -d
#
# Adds: Alertmanager (notification routing for Prometheus alerts),
#        Loki (log aggregation), Promtail (container log shipper).
services:
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cp_alertmanager
    volumes:
      - ./infra/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - cloudnet

  loki:
    image: grafana/loki:latest
    container_name: cp_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - cloudnet

  promtail:
    image: grafana/promtail:latest
    container_name: cp_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - cloudnet
