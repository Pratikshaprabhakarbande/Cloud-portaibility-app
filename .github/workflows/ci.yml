name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (audit, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No lockfiles are committed yet (the build env blocks the npm registry,
      # so they can't be generated here). Use `npm install`. Once lockfiles are
      # committed from an environment with registry access, switch to `npm ci`.
      - run: npm install
      # Report known high/critical vulnerabilities without failing the build.
      - name: npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - run: npm run lint --if-present
      - run: npm test -- --coverage

  frontend:
    name: Frontend (audit, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t cp-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t cp-frontend:ci ./frontend
