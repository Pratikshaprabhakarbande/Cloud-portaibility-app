name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (audit, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Prefer reproducible installs. `npm ci` is used automatically once a
      # committed package-lock.json exists; otherwise it falls back to
      # `npm install` (the build env that authored this blocks the npm registry,
      # so lockfiles are generated separately — see docs/12-lockfiles.md).
      - name: Install dependencies (npm ci, fallback npm install)
        run: npm ci || npm install
      # Report known high/critical vulnerabilities without failing the build.
      - name: npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - run: npm run lint --if-present
      - run: npm test -- --coverage

  frontend:
    name: Frontend (audit, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies (npm ci, fallback npm install)
        run: npm ci || npm install
      - name: npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t cp-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t cp-frontend:ci ./frontend
