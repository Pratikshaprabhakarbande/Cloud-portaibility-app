name: Security Scan

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Report known high/critical vulnerabilities without failing the build.
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the Trivy CLI directly (pinned, pre-compromise version) instead
      # of the marketplace action — avoids the unresolvable tag and the 2026
      # trivy-action supply-chain incident. Non-blocking (report-only).
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.50.0/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin" v0.50.0
          echo "$RUNNER_TEMP/trivy-bin" >> "$GITHUB_PATH"
      - name: Trivy filesystem scan (vuln, secret, misconfig)
        run: trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --ignore-unfixed --no-progress --exit-code 0 .
        continue-on-error: true
