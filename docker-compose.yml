# ============================================================
# Full local stack — one command: `docker compose up --build`
# Runs in DEMO_MODE by default (no cloud credentials, zero cost).
# ============================================================
services:
  backend:
    build: ./backend
    container_name: cp_backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - cloudnet

  frontend:
    build: ./frontend
    container_name: cp_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cloudnet

  mongo:
    image: mongo:7
    container_name: cp_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-changeme}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - cloudnet

  prometheus:
    image: prom/prometheus:latest
    container_name: cp_prometheus
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - cloudnet

  grafana:
    image: grafana/grafana:latest
    container_name: cp_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cloudnet

volumes:
  mongo_data:
  grafana_data:

networks:
  cloudnet:
    driver: bridge
